<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cornelia Street Bistro</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #2a2420;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .splash-img {
            width: auto;
            height: auto;
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            display: block;
            animation: fadeIn 0.8s ease both, logoPulse 3s 0.8s ease-in-out infinite;
        }
        .bar-wrap {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            text-align: center;
        }
        .bar-track {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .bar-fill {
            height: 100%;
            background: linear-gradient(to right, #C8844A, #f0c060, #C8844A);
            background-size: 200% 100%;
            border-radius: 10px;
            width: 0%;
            animation: shimmer 1.5s linear infinite;
            transition: width 0.3s ease;
        }
        .loading-txt {
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-family: system-ui, sans-serif;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes fadeIn    { from{opacity:0} to{opacity:1} }
        @keyframes logoPulse { 0%,100%{filter:drop-shadow(0 0 30px rgba(200,160,60,0.25))} 50%{filter:drop-shadow(0 0 60px rgba(200,160,60,0.5))} }
        @keyframes shimmer   { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        @keyframes pulse     { 0%,100%{opacity:0.25} 50%{opacity:0.6} }
        @keyframes fadeOut   { from{opacity:1} to{opacity:0} }
        .fade-out { animation: fadeOut 0.6s ease forwards; }
    </style>
</head>

    <div class="bar-wrap">
        <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
        <div class="loading-txt" id="lt">Starting up...</div>
    </div>

    <script>
        const msgs = ['Starting up...','Connecting to database...','Loading payroll engine...','Preparing attendance...','Almost ready...'];
        let msgIdx = 0;
        const ltEl  = document.getElementById('lt');
        const barEl = document.getElementById('bar');

        // Cycle messages
        setInterval(() => {
            msgIdx = (msgIdx + 1) % msgs.length;
            ltEl.textContent = msgs[msgIdx];
        }, 1800);

        // Animate progress bar
        const steps = [
            { w: '15%',  t: 500  },
            { w: '35%',  t: 2000 },
            { w: '60%',  t: 4000 },
            { w: '80%',  t: 6000 },
            { w: '92%',  t: 8000 },
            { w: '100%', t: 10000 },
        ];
        steps.forEach(s => setTimeout(() => barEl.style.width = s.w, s.t));

        // After loading — fade out then redirect to login
        setTimeout(() => {
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = 'http://127.0.0.1:8000/login';
            }, 650);
        }, 10500);
    </script>
